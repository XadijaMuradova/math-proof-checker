name: Math Proof Checker CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:

  CI_Test:
    name: CI - Proof Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install sympy reportlab

      - name: Run validation
        run: python check_proof.py


  CD_Deploy:
    name: CD - Report Generation
    needs: CI_Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install sympy reportlab

      - name: Generate report
        run: python generate_report.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: math-report
          path: dist/
