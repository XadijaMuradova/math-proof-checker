
   name: Math Proof Checker & Report Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  Build_Test:
    runs-on: ubuntu-latest
    steps:
      - name: Repository-ni yüklə
        uses: actions/checkout@v4

      - name: Python mühitini qur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Sübutun doğruluğunu yoxla (Validation)
        run: python check_proof.py

      - name: Riyazi testləri icra et
        run: echo "Riyazi tənliklər və düsturlar yoxlanılır..."

  Build_Deploy:
    needs: Build_Test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Repository-ni yüklə
        uses: actions/checkout@v4

      - name: Hesabatı generasiya et (Deployment imitasiyası)
        run: |
          mkdir -p release
          echo "Sübut təsdiqləndi. Tarix: $(date)" > release/final_report.txt
          echo "PDF hesabat yaradılır..." > release/report_log.log

      - name: Hesabatı Artifact olaraq yadda saxla
        uses: actions/upload-artifact@v4
        with:
          name: math-proof-result
          path: release/
