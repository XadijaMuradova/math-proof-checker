name: Math Proof Checker Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Build_Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run proof validation
        run: python check_proof.py

  Build_Deploy:
    needs: Build_Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Report
        run: |
          mkdir -p output
          echo "Proof validation completed successfully." > output/report.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: math-report
          path: output/
